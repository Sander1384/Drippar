services:
  driparr:
    build:
      context: .
    container_name: driparr
    restart: unless-stopped
    ports:
      - "${DRIPARR_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      DRIPARR_ADMIN_USERNAME: ${DRIPARR_ADMIN_USERNAME}
      DRIPARR_ADMIN_PASSWORD: ${DRIPARR_ADMIN_PASSWORD}
      DRIPARR_SESSION_SECRET: ${DRIPARR_SESSION_SECRET}
    volumes:
      - ./data:/app/data
